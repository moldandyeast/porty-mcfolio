name: PortyMcFolio
options:
  bundleIdPrefix: com.portymcfolio
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.0.0
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0

targets:
  PortyMcFolio:
    type: application
    platform: macOS
    sources:
      - path: PortyMcFolio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.portymcfolio.app
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "5.9"
        PRODUCT_NAME: PortyMcFolio
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Yams
      - package: Sparkle
    entitlements:
      path: PortyMcFolio/PortyMcFolio.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true

  PortyMcFolioTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PortyMcFolioTests
    dependencies:
      - target: PortyMcFolio
      - package: GRDB
        product: GRDB
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.portymcfolio.tests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "15.0"
